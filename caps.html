<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    .angel-image {
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      border: 8px solid rgba(255, 255, 255, 0.2);
      transition: transform 0.4s ease;
    }

    .angel-image:hover {
      transform: scale(1.05);
    }

    h1 {
      margin-top: 25px;
      font-size: 2.8rem;
      text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    p {
      font-size: 1.2rem;
      margin-top: 10px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="imagem.png" alt="Lucas Anjo" class="angel-image">
    <h1>Lucas</h1>
    <p>✨ Vivendo entre o céu e a cozinha ✨</p>
  </div>
</body>
</html>
