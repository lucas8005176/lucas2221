<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Site</title>

    <style>
        body {
            margin: 0;
            padding: 0;

            /* IMAGEM DE FUNDO */
            background-image: url('fundo.png');

            /* Ajustes do fundo */
            background-size: cover;       /* cobre toda a tela */
            background-position: center;  /* centraliza */
            background-repeat: no-repeat; /* não repete */
            height: 100vh;
        }

        .conteudo {
            color: white;
            text-align: center;
            padding-top: 40vh;
            font-size: 30px;
            font-family: Arial;
        }
    </style>
</head>
<body>

    <div class="conteudo">
        Meu site com fundo 🔥
    </div>

</body>
</html>
