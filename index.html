<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎒 Minha Mochila • Aulas & Anotações</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
    .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-6px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); }
    .materia-item { transition: all 0.2s; }
    .tab-active { border-bottom: 4px solid rgb(167 139 250); color: white; font-weight: 600; }
    .toast { animation: slideIn 0.3s ease forwards; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .horario-slot { cursor: pointer; }
    .horario-slot:hover { background-color: #4f46e5; }
  </style>
</head>
<body class="min-h-screen text-white">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-80 bg-zinc-900 border-r border-violet-500/30 flex flex-col">
      <div class="p-6 border-b border-zinc-700 flex items-center gap-3">
        <div class="w-12 h-12 bg-gradient-to-br from-violet-400 to-fuchsia-500 rounded-2xl flex items-center justify-center text-3xl shadow-lg">🎒</div>
        <h1 class="text-3xl font-bold tracking-tight">Minha Mochila</h1>
      </div>

      <!-- Busca e Nova Matéria -->
      <div class="p-4 space-y-3">
        <div class="relative">
          <input id="buscaMateria" type="text" placeholder="Buscar matéria..." 
                 class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-3 pl-11 focus:outline-none focus:border-violet-400"/>
          <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400"></i>
        </div>
        <div class="flex gap-2">
          <input id="novaMateria" type="text" placeholder="Nova matéria..." 
                 class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-3 focus:outline-none focus:border-violet-400"/>
          <button onclick="adicionarMateria()" 
                  class="bg-violet-600 hover:bg-violet-500 px-6 py-3 rounded-3xl">
            <i class="fas fa-plus"></i>
          </button>
        </div>
      </div>

      <div class="flex-1 overflow-y-auto px-3" id="listaMaterias"></div>

      <div class="p-4 border-t border-zinc-700 flex justify-between text-sm">
        <button onclick="limparTudo()" class="text-red-400 hover:text-red-500 flex items-center gap-2">
          <i class="fas fa-trash"></i> Esvaziar
        </button>
        <span id="totalMaterias" class="text-zinc-400"></span>
      </div>
    </div>

    <!-- Área Principal -->
    <div class="flex-1 flex flex-col">
      <!-- Tabs -->
      <div class="bg-zinc-900 border-b border-zinc-700 px-6">
        <div class="flex gap-8 text-lg">
          <button onclick="mudarAba(0)" id="tab0" class="tab py-5 tab-active">📝 Aulas & Anotações</button>
          <button onclick="mudarAba(1)" id="tab1" class="tab py-5">⏰ Horários</button>
          <button onclick="mudarAba(2)" id="tab2" class="tab py-5">📊 Planilha</button>
        </div>
      </div>

      <!-- Conteúdo das Abas -->
      <div id="conteudoAba0" class="flex-1 flex flex-col"> <!-- Aba Aulas -->
        <!-- Header e conteúdo da aba de anotações (igual ao anterior) -->
        <header id="headerMateria" class="hidden border-b border-zinc-700 bg-zinc-900 px-6 py-4 flex items-center justify-between">
          <button onclick="voltarParaMaterias()" class="flex items-center gap-2 text-violet-400 hover:text-violet-300">
            <i class="fas fa-arrow-left"></i> Voltar
          </button>
          <h2 id="tituloMateria" class="text-2xl font-bold flex items-center gap-3"></h2>
          <div class="flex items-center gap-4">
            <span id="contadorAnotacoes" class="bg-zinc-800 px-4 py-1 rounded-3xl text-sm"></span>
            <button onclick="salvarAnotacao()" class="bg-emerald-500 hover:bg-emerald-600 px-6 py-2 rounded-3xl font-semibold flex items-center gap-2">
              <i class="fas fa-save"></i> Salvar Aula
            </button>
          </div>
        </header>

        <div id="telaInicial" class="flex-1 flex items-center justify-center">
          <div class="text-center">
            <div class="text-9xl mb-6 animate-bounce">🎒</div>
            <h2 class="text-5xl font-bold mb-4">Bem-vindo à sua Mochila!</h2>
            <p class="text-zinc-400 text-xl">Escolha uma matéria ou use as abas acima.</p>
          </div>
        </div>

        <div id="areaAnotacoes" class="hidden flex-1 flex flex-col">
          <div class="p-6 bg-zinc-900 border-b border-zinc-700">
            <textarea id="novaAnotacao" rows="4" placeholder="O que rolou na aula hoje? ✍️"
                      class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl p-5 text-lg resize-none focus:outline-none focus:border-emerald-400"></textarea>
            <div class="flex justify-between items-center mt-3">
              <div id="charCount" class="text-xs text-zinc-500">0 / 2000</div>
              <button onclick="salvarAnotacao()" class="bg-emerald-500 hover:bg-emerald-600 px-8 py-3 rounded-3xl font-semibold flex items-center gap-2">
                📌 Salvar anotação
              </button>
            </div>
          </div>
          <div id="listaAnotacoes" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
        </div>
      </div>

      <!-- Aba Horários -->
      <div id="conteudoAba1" class="hidden flex-1 p-6 overflow-auto">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-3xl font-bold">Horário Escolar</h2>
          <div class="flex gap-3">
            <button onclick="mudarTurno('matutino')" id="btnMatutino" 
                    class="px-6 py-2 rounded-3xl font-semibold bg-indigo-600">Matutino</button>
            <button onclick="mudarTurno('vespertino')" id="btnVespertino" 
                    class="px-6 py-2 rounded-3xl font-semibold bg-zinc-700 hover:bg-zinc-600">Vespertino</button>
          </div>
        </div>

        <div class="grid grid-cols-6 gap-4" id="gradeHorario"></div>
      </div>

      <!-- Aba Planilha -->
      <div id="conteudoAba2" class="hidden flex-1 p-6 overflow-auto">
        <h2 class="text-3xl font-bold mb-6">Planilha de Controle</h2>
        <table class="w-full bg-zinc-900 rounded-3xl overflow-hidden">
          <thead>
            <tr class="bg-zinc-800">
              <th class="px-6 py-4 text-left">Matéria</th>
              <th class="px-6 py-4 text-center">Faltas</th>
              <th class="px-6 py-4 text-center">Nota 1</th>
              <th class="px-6 py-4 text-center">Nota 2</th>
              <th class="px-6 py-4 text-center">Nota 3</th>
              <th class="px-6 py-4 text-center">Média</th>
              <th class="px-6 py-4 text-center">Situação</th>
            </tr>
          </thead>
          <tbody id="tabelaPlanilha" class="divide-y divide-zinc-700"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-zinc-800 border border-violet-500 text-white px-6 py-3 rounded-3xl shadow-2xl"></div>

  <audio id="actionSound" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3" type="audio/mpeg">
  </audio>

  <script>
    let materias = [];
    let materiaAtual = null;
    let filtroAtual = '';
    let turnoAtual = 'matutino';

    // Horários base (pode ser editado)
    let horarios = {
      matutino: [
        { hora: "07:00 - 07:50", aula: "" },
        { hora: "07:50 - 08:40", aula: "" },
        { hora: "08:50 - 09:40", aula: "" },
        { hora: "09:40 - 10:30", aula: "" },
        { hora: "10:40 - 11:30", aula: "" },
        { hora: "11:30 - 12:20", aula: "" }
      ],
      vespertino: [
        { hora: "13:00 - 13:50", aula: "" },
        { hora: "13:50 - 14:40", aula: "" },
        { hora: "14:50 - 15:40", aula: "" },
        { hora: "15:40 - 16:30", aula: "" },
        { hora: "16:40 - 17:30", aula: "" },
        { hora: "17:30 - 18:20", aula: "" }
      ]
    };

    // Funções de som e toast (mesmas do anterior)
    function playActionSound() { /* ... mesmo código */ }
    function showToast(mensagem, tipo = 'success') { /* ... mesmo código */ }

    function criarMateriasIniciais() {
      const iniciais = ["Língua Portuguesa", "Literatura", "Redação", "Matemática", "Física", "Química", "Biologia", 
                       "História", "Geografia", "Filosofia", "Sociologia", "Inglês", "Artes", "Educação Física"];
      materias = iniciais.map(nome => ({ nome, anotacoes: [], faltas: 0, notas: [0,0,0] }));
      salvarDados();
    }

    function carregarDados() {
      const salvos = localStorage.getItem('mochilaEscolar');
      if (salvos) materias = JSON.parse(salvos);
      else criarMateriasIniciais();
      renderizarListaMaterias();
      renderizarPlanilha();
    }

    function salvarDados() {
      localStorage.setItem('mochilaEscolar', JSON.stringify(materias));
    }

    // Renderizações (mantidas e melhoradas)
    function renderizarListaMaterias() { /* mesmo código anterior, com ícones */ }
    function getIconeMateria(nome) { /* mesmo código anterior */ }

    function mudarAba(aba) {
      document.querySelectorAll('[id^="conteudoAba"]').forEach(el => el.classList.add('hidden'));
      document.getElementById(`conteudoAba${aba}`).classList.remove('hidden');
      
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active'));
      document.getElementById(`tab${aba}`).classList.add('tab-active');
    }

    function mudarTurno(turno) {
      turnoAtual = turno;
      document.getElementById('btnMatutino').classList.toggle('bg-indigo-600', turno === 'matutino');
      document.getElementById('btnMatutino').classList.toggle('bg-zinc-700', turno !== 'matutino');
      document.getElementById('btnVespertino').classList.toggle('bg-indigo-600', turno === 'vespertino');
      document.getElementById('btnVespertino').classList.toggle('bg-zinc-700', turno !== 'vespertino');
      renderizarHorarios();
    }

    function renderizarHorarios() {
      const container = document.getElementById('gradeHorario');
      container.innerHTML = '';
      const slots = horarios[turnoAtual];

      slots.forEach((slot, i) => {
        const div = document.createElement('div');
        div.className = `horario-slot bg-zinc-800 border border-zinc-700 rounded-3xl p-4 text-center hover:border-violet-400`;
        div.innerHTML = `
          <p class="text-xs text-zinc-400">${slot.hora}</p>
          <p class="font-semibold mt-2 text-lg ${slot.aula ? 'text-white' : 'text-zinc-500'}">${slot.aula || 'Clique para adicionar'}</p>
        `;
        div.onclick = () => editarHorario(i);
        container.appendChild(div);
      });
    }

    function editarHorario(index) {
      const materiaNome = prompt("Qual matéria vai nessa aula?", "");
      if (materiaNome) {
        horarios[turnoAtual][index].aula = materiaNome;
        renderizarHorarios();
        showToast("Horário atualizado!");
      }
    }

    function renderizarPlanilha() {
      const tbody = document.getElementById('tabelaPlanilha');
      tbody.innerHTML = '';
      materias.forEach((m, i) => {
        const media = (m.notas[0] + m.notas[1] + m.notas[2]) / 3;
        const situacao = media >= 6 ? 'Aprovado' : 'Recuperação';
        
        const tr = document.createElement('tr');
        tr.className = "hover:bg-zinc-800";
        tr.innerHTML = `
          <td class="px-6 py-4 font-medium">${m.nome}</td>
          <td class="px-6 py-4 text-center">
            <input type="number" value="${m.faltas}" onchange="atualizarFaltas(${i}, this.value)" 
                   class="bg-zinc-800 w-16 text-center rounded-xl py-1">
          </td>
          <td class="px-6 py-4 text-center"><input type="number" step="0.1" value="${m.notas[0]}" onchange="atualizarNota(${i}, 0, this.value)" class="bg-zinc-800 w-20 text-center rounded-xl py-1"></td>
          <td class="px-6 py-4 text-center"><input type="number" step="0.1" value="${m.notas[1]}" onchange="atualizarNota(${i}, 1, this.value)" class="bg-zinc-800 w-20 text-center rounded-xl py-1"></td>
          <td class="px-6 py-4 text-center"><input type="number" step="0.1" value="${m.notas[2]}" onchange="atualizarNota(${i}, 2, this.value)" class="bg-zinc-800 w-20 text-center rounded-xl py-1"></td>
          <td class="px-6 py-4 text-center font-bold ${media >= 6 ? 'text-emerald-400' : 'text-orange-400'}">${media.toFixed(1)}</td>
          <td class="px-6 py-4 text-center ${media >= 6 ? 'text-emerald-400' : 'text-orange-400'}">${situacao}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function atualizarFaltas(index, valor) {
      materias[index].faltas = parseInt(valor) || 0;
      salvarDados();
    }

    function atualizarNota(index, bimestre, valor) {
      materias[index].notas[bimestre] = parseFloat(valor) || 0;
      salvarDados();
      renderizarPlanilha();
    }

    // Funções de Anotações (mantidas do código anterior - salvarAnotacao, renderizarAnotacoes, etc.)
    // ... (coloque aqui todas as funções de anotação que já estavam funcionando)

    function limparTudo() {
      if (confirm("Apagar TODA a mochila?")) {
        localStorage.clear();
        materias = [];
        criarMateriasIniciais();
        renderizarListaMaterias();
        renderizarPlanilha();
        showToast("Mochila reiniciada!");
      }
    }

    window.onload = () => {
      carregarDados();
      mudarAba(0);           // Abre na aba Aulas por padrão
      renderizarHorarios();  // Renderiza horários

      // Eventos de busca e input (mesmo do anterior)
      document.getElementById('buscaMateria').addEventListener('input', (e) => {
        filtroAtual = e.target.value;
        renderizarListaMaterias();
      });
    };
  </script>
</body>
</html>
