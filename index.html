<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Mochila</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* LAYOUT */
body {
  display: flex;
  height: 100vh;
  background: #0f0f1a;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: rgba(20, 20, 40, 0.95);
  backdrop-filter: blur(10px);
  padding: 20px;
  display: flex;
  flex-direction: column;
}

/* TÍTULO */
.sidebar h2 {
  color: white;
  margin-bottom: 20px;
}

/* INPUT */
.sidebar input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  background: #1f1f3a;
  color: white;
}

/* BOTÃO + */
.add-button {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #6c63ff, #8b5cf6);
  color: white;
  font-size: 22px;
  margin: 10px 0;
  cursor: pointer;
  transition: 0.3s;
}

.add-button:hover {
  transform: scale(1.1) rotate(10deg);
}

/* MATÉRIAS */
.sidebar-item {
  padding: 12px;
  border-radius: 12px;
  color: #cfcfff;
  margin: 5px 0;
  transition: 0.3s;
  cursor: pointer;
}

.sidebar-item:hover {
  background: rgba(255,255,255,0.08);
  transform: translateX(5px);
}

.sidebar-item.active {
  background: linear-gradient(90deg, #6c63ff, #8b5cf6);
  color: white;
}

/* BOTÕES DE BAIXO */
.bottom {
  margin-top: auto;
}

.bottom-button {
  padding: 14px;
  border-radius: 14px;
  margin: 8px 0;
  color: white;
  cursor: pointer;
  transition: 0.3s;
  background: linear-gradient(135deg, #2a2d5f, #3b3ecf);
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.bottom-button:hover {
  transform: translateY(-5px) scale(1.02);
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* CONTEÚDO */
.main {
  flex: 1;
  background: linear-gradient(135deg, #1e1f4b, #3a3d9f, #5f60ff);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

/* TEXTO */
.main h1 {
  font-size: 42px;
  color: white;
}

.main p {
  color: #d1d5ff;
  margin-top: 10px;
}

/* ANIMAÇÃO */
.main img {
  width: 100px;
  margin-bottom: 20px;
  animation: float 3s infinite ease-in-out;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🎒 Minha Mochila</h2>

  <input placeholder="Buscar matéria...">
  <input placeholder="Nova matéria...">
  <button class="add-button">+</button>

  <div class="sidebar-item active">Português</div>
  <div class="sidebar-item">Matemática</div>
  <div class="sidebar-item">História</div>
  <div class="sidebar-item">Geografia</div>

  <div class="bottom">
    <div class="bottom-button">🧑‍🦯 Braille</div>
    <div class="bottom-button">📚 Aulas</div>
    <div class="bottom-button">🎓 CAPS</div>
  </div>
</div>

<!-- CONTEÚDO -->
<div class="main">
  <div>
    <img src="https://cdn-icons-png.flaticon.com/512/1040/1040230.png">
    <h1>Bem-vindo à sua Mochila!</h1>
    <p>Organize suas aulas e anotações aqui.</p>
  </div>
</div>

</body>
</html>
