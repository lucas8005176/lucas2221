<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Mochila Digital</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>👜 Minha Mochila Digital</h1>

    <!-- Adicionar Matéria -->
    <div class="add-materia">
      <input type="text" id="novaMateria" placeholder="Nome da matéria (ex: Matemática)">
      <button onclick="adicionarMateria()">+ Adicionar Matéria</button>
    </div>

    <!-- Lista de Matérias -->
    <div class="materias" id="listaMaterias"></div>

    <!-- Área de Anotações -->
    <div class="anotacoes" id="areaAnotacoes" style="display: none;">
      <div class="header-anotacoes">
        <h2 id="tituloMateria"></h2>
        <button onclick="voltarParaMaterias()">← Voltar</button>
      </div>
      
      <textarea id="novaAnotacao" placeholder="Escreva sua anotação aqui..."></textarea>
      <button onclick="salvarAnotacao()">Salvar Anotação</button>

      <div class="lista-anotacoes" id="listaAnotacoes"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
