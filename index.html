<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Mochila</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

/* LAYOUT GERAL */
body {
  display: flex;
  height: 100vh;
  background: #0b0f1a;
  overflow: hidden;
}

/* SIDEBAR MODERNA */
.sidebar {
  width: 280px;
  background: rgba(18, 18, 35, 0.95);
  backdrop-filter: blur(15px);
  padding: 20px;
  display: flex;
  flex-direction: column;
  color: white;
}

/* TÍTULO */
.logo {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 20px;
}

/* INPUTS */
input {
  padding: 12px;
  border-radius: 12px;
  border: none;
  margin-bottom: 10px;
  background: #1c1f3a;
  color: white;
  outline: none;
}

/* BOTÃO + */
.add {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #6c63ff, #8b5cf6);
  color: white;
  font-size: 22px;
  cursor: pointer;
  margin: 10px 0;
  transition: 0.3s;
}

.add:hover {
  transform: scale(1.15) rotate(15deg);
}

/* MATÉRIAS */
.item {
  padding: 12px;
  border-radius: 12px;
  margin: 5px 0;
  background: transparent;
  cursor: pointer;
  transition: 0.3s;
  color: #cfcfff;
}

.item:hover {
  background: rgba(255,255,255,0.08);
  transform: translateX(6px);
}

.item.active {
  background: linear-gradient(90deg, #6c63ff, #8b5cf6);
  color: white;
}

/* PARTE DE BAIXO */
.bottom {
  margin-top: auto;
}

/* BOTÕES NOVOS ESTILO CARD */
.card {
  background: linear-gradient(135deg, #2a2d5f, #3b3ecf);
  padding: 14px;
  border-radius: 16px;
  margin: 10px 0;
  cursor: pointer;
  transition: 0.3s;
  display: flex;
  align-items: center;
  gap: 10px;
  color: white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.card:hover {
  transform: translateY(-6px) scale(1.02);
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
}

/* CONTEÚDO PRINCIPAL */
.main {
  flex: 1;
  background: radial-gradient(circle at top, #3a3d9f, #1e1f4b, #0b0f1a);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
  padding: 20px;
}

/* CARTÃO CENTRAL */
.box {
  background: rgba(255,255,255,0.05);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* ANIMAÇÃO */
.box h1 {
  font-size: 38px;
  margin-bottom: 10px;
}

.box p {
  color: #cfd3ff;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="logo">🎒 Minha Mochila</div>

  <input placeholder="Buscar matéria...">
  <input placeholder="Nova matéria...">

  <button class="add">+</button>

  <div class="item active">📘 Português</div>
  <div class="item">📐 Matemática</div>
  <div class="item">📜 História</div>
  <div class="item">🌎 Geografia</div>

  <div class="bottom">
    <div class="card">🧑‍🦯 Braille</div>
    <div class="card">📚 Aulas</div>
    <div class="card">🎓 CAPS</div>
  </div>

</div>

<!-- CONTEÚDO -->
<div class="main">
  <div class="box">
    <h1>Bem-vindo à sua Mochila 🎒</h1>
    <p>Organize suas matérias e anotações de forma simples e bonita.</p>
  </div>
</div>

</body>
</html>
