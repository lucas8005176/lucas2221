<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📚 Minha Mochila • Aulas & Anotações</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
    .card { transition: all 0.3s; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3); }
  </style>
</head>
<body class="min-h-screen text-white">

  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-80 bg-zinc-900 border-r border-violet-500/30 flex flex-col">
      <div class="p-6 border-b border-zinc-700 flex items-center gap-3">
        <div class="w-12 h-12 bg-gradient-to-br from-violet-400 to-fuchsia-500 rounded-2xl flex items-center justify-center text-3xl shadow-lg">🎒</div>
        <h1 class="text-3xl font-bold tracking-tight">Minha Mochila</h1>
      </div>

      <div class="p-4">
        <input id="novaMateria" type="text" placeholder="Nova matéria (ex: Matemática)" 
               class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-3 focus:outline-none focus:border-violet-400 text-lg"/>
        <button onclick="adicionarMateria()" 
                class="mt-3 w-full bg-violet-600 hover:bg-violet-500 py-3 rounded-3xl font-semibold flex items-center justify-center gap-2">
          <i class="fas fa-plus"></i> Colocar na mochila
        </button>
      </div>

      <div id="listaMaterias" class="flex-1 overflow-y-auto px-3"></div>

      <div class="p-4 border-t border-zinc-700">
        <button onclick="limparTudo()" class="text-red-400 hover:text-red-500 text-sm flex items-center gap-2">
          <i class="fas fa-trash"></i> Esvaziar mochila
        </button>
      </div>
    </div>

    <!-- Área Principal -->
    <div class="flex-1 flex flex-col">
      <header id="headerMateria" class="hidden border-b border-zinc-700 bg-zinc-900 px-6 py-4 flex items-center justify-between">
        <button onclick="voltarParaMaterias()" class="flex items-center gap-2 text-violet-400 hover:text-violet-300">
          <i class="fas fa-arrow-left"></i> Voltar
        </button>
        <h2 id="tituloMateria" class="text-2xl font-bold"></h2>
        <div class="flex items-center gap-4">
          <span id="contadorAnotacoes" class="bg-zinc-800 px-4 py-1 rounded-3xl text-sm"></span>
          <button onclick="salvarAnotacao()" 
                  class="bg-emerald-500 hover:bg-emerald-600 px-6 py-2 rounded-3xl font-semibold flex items-center gap-2">
            <i class="fas fa-save"></i> Salvar Aula
          </button>
        </div>
      </header>

      <div id="telaInicial" class="flex-1 flex items-center justify-center">
        <div class="text-center">
          <div class="text-8xl mb-6 animate-bounce">🎒</div>
          <h2 class="text-4xl font-bold mb-3">Bem-vindo à sua Mochila!</h2>
          <p class="text-zinc-400 text-lg">Adicione matérias no lado esquerdo e comece a anotar suas aulas</p>
          <button onclick="document.getElementById('novaMateria').focus()" 
                  class="mt-8 bg-white text-zinc-900 px-8 py-3 rounded-3xl font-bold text-lg hover:scale-105 transition">
            🎯 Adicionar primeira matéria
          </button>
        </div>
      </div>

      <div id="areaAnotacoes" class="hidden flex-1 flex flex-col">
        <div class="p-6 bg-zinc-900 border-b border-zinc-700">
          <textarea id="novaAnotacao" rows="3" placeholder="O que aconteceu na aula hoje? ✍️"
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl p-5 text-lg resize-none focus:outline-none focus:border-emerald-400"></textarea>
          <div class="flex justify-end mt-3">
            <button onclick="salvarAnotacao()" 
                    class="bg-emerald-500 hover:bg-emerald-600 px-8 py-3 rounded-3xl font-semibold flex items-center gap-2">
              📌 Salvar anotação da aula
            </button>
          </div>
        </div>

        <div id="listaAnotacoes" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
      </div>
    </div>
  </div>

  <!-- Efeito sonoro (clique positivo curto - Mixkit royalty-free) -->
  <audio id="actionSound" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3" type="audio/mpeg">
  </audio>

  <script>
    // Função para tocar o som
    function playActionSound() {
      const audio = document.getElementById('actionSound');
      if (audio) {
        audio.currentTime = 0;
        audio.volume = 0.35; // volume suave – ajuste se quiser mais alto (0.0 a 1.0)
        audio.play().catch(() => {}); // ignora erro de autoplay
      }
    }

    let materias = [];
    let materiaAtual = null;

    function carregarDados() {
      const salvos = localStorage.getItem('mochilaEscolar');
      materias = salvos ? JSON.parse(salvos) : [];
      renderizarListaMaterias();
    }

    function salvarDados() {
      localStorage.setItem('mochilaEscolar', JSON.stringify(materias));
    }

    function renderizarListaMaterias() {
      const container = document.getElementById('listaMaterias');
      container.innerHTML = '';
      if (materias.length === 0) {
        container.innerHTML = `<div class="px-6 py-8 text-center text-zinc-500"><i class="fas fa-book-open text-5xl opacity-30"></i><p class="mt-3">Sua mochila está vazia...</p></div>`;
        return;
      }
      materias.forEach((m, i) => {
        const active = materiaAtual && materiaAtual.index === i;
        const div = document.createElement('div');
        div.className = `mx-3 my-2 px-5 py-4 rounded-3xl flex items-center gap-3 cursor-pointer transition-all ${active ? 'bg-violet-600 text-white shadow-xl' : 'hover:bg-zinc-800'}`;
        div.innerHTML = `
          <i class="fas fa-book text-xl"></i>
          <div class="flex-1">
            <h3 class="font-semibold">${m.nome}</h3>
            <p class="text-xs text-zinc-400">${m.anotacoes.length} anotação${m.anotacoes.length !== 1 ? 's' : ''}</p>
          </div>
        `;
        div.onclick = () => {
          playActionSound(); // som ao abrir matéria
          abrirMateria(i);
        };
        container.appendChild(div);
      });
    }

    function adicionarMateria() {
      const input = document.getElementById('novaMateria');
      const nome = input.value.trim();
      if (!nome) return alert("Digite o nome da matéria!");
      if (materias.some(m => m.nome.toLowerCase() === nome.toLowerCase())) {
        return alert("Essa matéria já está na mochila!");
      }
      materias.unshift({ nome, anotacoes: [] });
      salvarDados();
      renderizarListaMaterias();
      input.value = '';
      input.focus();
      playActionSound(); // som ao adicionar
    }

    function abrirMateria(index) {
      materiaAtual = { index, nome: materias[index].nome, anotacoes: materias[index].anotacoes };
      
      document.getElementById('telaInicial').classList.add('hidden');
      document.getElementById('areaAnotacoes').classList.remove('hidden');
      document.getElementById('headerMateria').classList.remove('hidden');
      document.getElementById('tituloMateria').textContent = materiaAtual.nome;
      
      atualizarContador();
      renderizarAnotacoes();
    }

    function voltarParaMaterias() {
      materiaAtual = null;
      document.getElementById('telaInicial').classList.remove('hidden');
      document.getElementById('areaAnotacoes').classList.add('hidden');
      document.getElementById('headerMateria').classList.add('hidden');
      renderizarListaMaterias();
      playActionSound(); // som ao voltar
    }

    function atualizarContador() {
      const qtd = materiaAtual.anotacoes.length;
      document.getElementById('contadorAnotacoes').textContent = `${qtd} anotação${qtd !== 1 ? 's' : ''}`;
    }

    function salvarAnotacao() {
      if (!materiaAtual) return;
      const texto = document.getElementById('novaAnotacao').value.trim();
      if (!texto) return alert("Escreva o que aconteceu na aula!");
      const data = new Date().toLocaleString('pt-BR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
      materias[materiaAtual.index].anotacoes.unshift({ texto, data });
      salvarDados();
      document.getElementById('novaAnotacao').value = '';
      renderizarAnotacoes();
      atualizarContador();
      playActionSound(); // som ao salvar anotação
    }

    function renderizarAnotacoes() {
      const container = document.getElementById('listaAnotacoes');
      container.innerHTML = '';
      if (materiaAtual.anotacoes.length === 0) {
        container.innerHTML = `
          <div class="text-center py-16 text-zinc-400">
            <i class="fas fa-feather-alt text-7xl opacity-30"></i>
            <p class="text-xl mt-4">Ainda não tem nada anotado...</p>
            <p class="text-sm">Escreva acima e salve a aula!</p>
          </div>`;
        return;
      }
      materiaAtual.anotacoes.forEach((a, i) => {
        const div = document.createElement('div');
        div.className = "card bg-zinc-800 border border-zinc-700 rounded-3xl p-6";
        div.innerHTML = `
          <div class="flex justify-between text-xs text-zinc-400 mb-3">
            <span>${a.data}</span>
            <button class="text-red-400 hover:text-red-500">
              <i class="fas fa-trash"></i>
            </button>
          </div>
          <p class="leading-relaxed whitespace-pre-wrap">${a.texto}</p>
        `;
        div.querySelector('button').onclick = (e) => {
          e.stopPropagation();
          if (confirm("Apagar esta anotação?")) {
            materias[materiaAtual.index].anotacoes.splice(i, 1);
            salvarDados();
            renderizarAnotacoes();
            atualizarContador();
            playActionSound(); // som ao excluir
          }
        };
        container.appendChild(div);
      });
    }

    function limparTudo() {
      if (confirm("⚠️ Apagar TODA a mochila? Isso não tem volta!")) {
        localStorage.clear();
        materias = [];
        materiaAtual = null;
        voltarParaMaterias();
        renderizarListaMaterias();
        playActionSound(); // som ao limpar tudo
      }
    }

    // Inicializar
    window.onload = () => {
      carregarDados();
      document.getElementById('novaMateria').addEventListener('keypress', e => {
        if (e.key === 'Enter') {
          adicionarMateria();
        }
      });
    };
  </script>
</body>
</html>
