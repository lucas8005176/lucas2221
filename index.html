<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mochila Digital • Suas Anotações</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system_ui, sans-serif; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); }
  </style>
</head>
<body class="bg-gradient-to-br from-zinc-950 via-zinc-900 to-black text-zinc-200 min-h-screen">

  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar elegante -->
    <div class="w-80 bg-zinc-900/90 border-r border-zinc-800 flex flex-col shadow-2xl">
      <div class="p-8 border-b border-zinc-800 flex items-center gap-4">
        <div class="w-12 h-12 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-3xl flex items-center justify-center text-3xl shadow-xl">👜</div>
        <div>
          <h1 class="text-3xl font-bold tracking-tighter">Mochila</h1>
          <p class="text-zinc-400 text-sm -mt-1">Digital</p>
        </div>
      </div>

      <!-- Adicionar matéria -->
      <div class="p-6">
        <div class="flex gap-3">
          <input 
            id="novaMateria" 
            type="text" 
            placeholder="Nome da matéria..." 
            class="flex-1 bg-zinc-800 border border-zinc-700 focus:border-violet-500 rounded-3xl px-6 py-4 text-sm outline-none transition-all"
            onkeypress="if(event.key === 'Enter') adicionarMateria()">
          <button 
            onclick="adicionarMateria()"
            class="bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-700 hover:to-fuchsia-700 px-7 rounded-3xl font-semibold flex items-center gap-2 shadow-lg active:scale-95 transition-all">
            <i class="fas fa-plus"></i>
          </button>
        </div>
      </div>

      <!-- Lista de matérias -->
      <div class="flex-1 overflow-y-auto px-4 py-2" id="listaMaterias">
        <!-- JS preenche aqui -->
      </div>

      <div class="p-6 border-t border-zinc-800 text-xs text-zinc-500 flex justify-between items-center">
        <span>Organize seu estudo com amor ❤️</span>
        <button onclick="limparTudo()" class="hover:text-red-400 transition-colors">
          <i class="fas fa-trash-alt"></i>
        </button>
      </div>
    </div>

    <!-- Área principal -->
    <div class="flex-1 flex flex-col">

      <!-- Header da matéria aberta -->
      <div id="headerMateria" class="hidden px-10 py-6 border-b border-zinc-800 bg-zinc-900/80 backdrop-blur-md items-center justify-between">
        <div class="flex items-center gap-5">
          <button onclick="voltarParaMaterias()" class="text-4xl text-zinc-400 hover:text-white transition-colors">←</button>
          <h2 id="tituloMateria" class="text-4xl font-semibold tracking-tight"></h2>
        </div>
        <div id="contadorAnotacoes" class="text-zinc-400"></div>
      </div>

      <!-- Tela de boas-vindas -->
      <div id="telaInicial" class="flex-1 flex flex-col items-center justify-center text-center px-10">
        <div class="text-[180px] mb-8 opacity-80 animate-bounce-slow">👜</div>
        <h2 class="text-5xl font-light text-white mb-4">Sua mochila está pronta</h2>
        <p class="text-xl text-zinc-400 max-w-md">Escolha ou crie uma matéria ao lado para começar a guardar suas anotações importantes.</p>
      </div>

      <!-- Área de anotações -->
      <div id="areaAnotacoes" class="hidden flex-1 flex flex-col">

        <!-- Campo para nova anotação -->
        <div class="p-10 bg-zinc-900 border-b border-zinc-800">
          <textarea 
            id="novaAnotacao" 
            rows="4"
            placeholder="Escreva aqui sua anotação... (dica: você pode usar quebras de linha)"
            class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-8 py-7 text-lg placeholder-zinc-500 focus:border-violet-500 focus:ring-2 focus:ring-violet-500/30 outline-none resize-none transition-all"></textarea>

          <div class="flex justify-end mt-5">
            <button 
              onclick="salvarAnotacao()"
              class="bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-700 hover:to-indigo-700 px-10 py-4 rounded-3xl font-semibold flex items-center gap-3 shadow-xl active:scale-95 transition-all">
              <i class="fas fa-save"></i>
              <span>Salvar Anotação</span>
            </button>
          </div>
        </div>

        <!-- Lista de anotações -->
        <div class="flex-1 overflow-y-auto p-10 space-y-8" id="listaAnotacoes">
          <!-- JS preenche aqui -->
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
