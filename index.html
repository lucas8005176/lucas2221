<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎒 Minha Mochila • Aulas & Anotações</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
    .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-6px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); }
    .materia-item { transition: all 0.2s; }
    .toast { animation: slideIn 0.3s ease forwards; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body class="min-h-screen text-white">
  <div class="flex h-screen">
    <!-- SIDEBAR -->
    <div class="w-80 bg-zinc-900 border-r border-violet-500/30 flex flex-col">
      <div class="p-6 border-b border-zinc-700 flex items-center gap-3">
        <div class="w-12 h-12 bg-gradient-to-br from-violet-400 to-fuchsia-500 rounded-2xl flex items-center justify-center text-3xl shadow-lg">🎒</div>
        <h1 class="text-3xl font-bold tracking-tight">Minha Mochila</h1>
      </div>
      <div class="p-4 space-y-3">
        <div class="relative">
          <input id="buscaMateria" type="text" placeholder="Buscar matéria..."
                 class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-3 pl-11 focus:outline-none focus:border-violet-400 text-lg"/>
          <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400"></i>
        </div>
        <div class="flex gap-2">
          <input id="novaMateria" type="text" placeholder="Nova matéria (ex: Física)"
                 class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-3 focus:outline-none focus:border-violet-400 text-lg"/>
          <button onclick="adicionarMateria()"
                  class="bg-violet-600 hover:bg-violet-500 px-6 py-3 rounded-3xl font-semibold flex items-center gap-2">
            <i class="fas fa-plus"></i>
          </button>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto px-3" id="listaMaterias"></div>
      <div class="p-4 border-t border-zinc-700 flex justify-between text-sm">
        <button onclick="limparTudo()" class="text-red-400 hover:text-red-500 flex items-center gap-2">
          <i class="fas fa-trash"></i> Esvaziar mochila
        </button>
        <span id="totalMaterias" class="text-zinc-400"></span>
      </div>
    </div>

    <!-- ÁREA PRINCIPAL -->
    <div class="flex-1 flex flex-col">
      <!-- Tabs -->
      <div class="bg-zinc-900 border-b border-zinc-700 px-6">
        <div class="flex gap-8 text-lg">
          <button onclick="mudarAba(0)" id="tab0" class="tab py-5 tab-active">📝 Aulas & Anotações</button>
          <button onclick="mudarAba(1)" id="tab1" class="tab py-5">📟 Sistemas Operacionais</button>
        </div>
      </div>

      <!-- ABA 0: ANOTAÇÕES -->
      <div id="conteudoAba0" class="flex-1 flex flex-col">
        <!-- ... (mesmo conteúdo anterior) ... -->
        <header id="headerMateria" class="hidden border-b border-zinc-700 bg-zinc-900 px-6 py-4 flex items-center justify-between">
          <button onclick="voltarParaMaterias()" class="flex items-center gap-2 text-violet-400 hover:text-violet-300">
            <i class="fas fa-arrow-left"></i> Voltar
          </button>
          <h2 id="tituloMateria" class="text-2xl font-bold flex items-center gap-3"></h2>
          <div class="flex items-center gap-4">
            <span id="contadorAnotacoes" class="bg-zinc-800 px-4 py-1 rounded-3xl text-sm"></span>
            <button onclick="salvarAnotacao()" class="bg-emerald-500 hover:bg-emerald-600 px-6 py-2 rounded-3xl font-semibold flex items-center gap-2">
              <i class="fas fa-save"></i> Salvar Aula
            </button>
          </div>
        </header>

        <div id="telaInicial" class="flex-1 flex items-center justify-center">
          <div class="text-center">
            <div class="text-9xl mb-6 animate-bounce">🎒</div>
            <h2 class="text-5xl font-bold mb-4">Bem-vindo à sua Mochila!</h2>
            <p class="text-zinc-400 text-xl">Organize suas aulas e anotações aqui.</p>
          </div>
        </div>

        <div id="areaAnotacoes" class="hidden flex-1 flex flex-col">
          <div class="p-6 bg-zinc-900 border-b border-zinc-700">
            <div class="relative">
              <textarea id="novaAnotacao" rows="4" placeholder="O que rolou na aula hoje? ✍️"
                        class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl p-5 text-lg resize-none focus:outline-none focus:border-emerald-400"></textarea>
              <div id="charCount" class="absolute bottom-4 right-6 text-xs text-zinc-500">0 / 2000</div>
            </div>
            <div class="flex justify-end mt-4">
              <button onclick="salvarAnotacao()" class="bg-emerald-500 hover:bg-emerald-600 px-8 py-3 rounded-3xl font-semibold flex items-center gap-2 text-lg">
                📌 Salvar anotação
              </button>
            </div>
          </div>
          <div id="listaAnotacoes" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
        </div>
      </div>

      <!-- NOVA ABA 1: SISTEMAS OPERACIONAIS -->
      <div id="conteudoAba1" class="hidden flex-1 p-6 overflow-auto">
        <h2 class="text-3xl font-bold mb-6 flex items-center gap-3">
          <i class="fas fa-desktop"></i> Sistemas Operacionais de PC
        </h2>
        <div id="listaSO" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-zinc-800 border border-violet-500 text-white px-6 py-3 rounded-3xl shadow-2xl"></div>
  <audio id="actionSound" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3" type="audio/mpeg">
  </audio>

  <script>
    // ==================== VARIÁVEIS GLOBAIS ====================
    let materias = [];
    let materiaAtual = null;
    let filtroAtual = '';

    // ==================== SISTEMAS OPERACIONAIS ====================
    let sistemasOperacionais = [
      { nome: "Windows 11", icone: "fab fa-windows", cor: "bg-blue-600", descricao: "Sistema da Microsoft mais usado no mundo.", versao: "Versão mais recente" },
      { nome: "Windows 10", icone: "fab fa-windows", cor: "bg-blue-500", descricao: "Ainda muito utilizado em empresas e PCs antigos.", versao: "Versão anterior" },
      { nome: "Linux Ubuntu", icone: "fab fa-linux", cor: "bg-orange-600", descricao: "Distribuição Linux amigável e muito usada.", versao: "24.04 LTS" },
      { nome: "Linux Mint", icone: "fab fa-linux", cor: "bg-emerald-600", descricao: "Baseado no Ubuntu, excelente para iniciantes.", versao: "21.3" },
      { nome: "macOS Sequoia", icone: "fab fa-apple", cor: "bg-gray-800", descricao: "Sistema da Apple para computadores Mac.", versao: "15" },
      { nome: "Chrome OS", icone: "fab fa-chrome", cor: "bg-blue-700", descricao: "Sistema do Google focado em nuvem.", versao: "Atual" }
    ];

    // ==================== FUNÇÕES COMUNS ====================
    function playActionSound() {
      const audio = document.getElementById('actionSound');
      audio.currentTime = 0;
      audio.volume = 0.4;
      audio.play().catch(() => {});
    }

    function showToast(msg, tipo = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `fixed bottom-6 right-6 px-6 py-3 rounded-3xl shadow-2xl ${
        tipo === 'error' ? 'bg-red-900 border-red-500' : 'bg-zinc-800 border-violet-500'
      }`;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    function salvarTodosDados() {
      localStorage.setItem('mochilaEscolar', JSON.stringify(materias));
    }

    // ==================== INICIALIZAÇÃO E MATÉRIAS (mantido igual) ====================
    function criarMateriasIniciais() {
      const iniciais = ["Língua Portuguesa", "Literatura", "Redação", "Matemática", "Física", "Química", "Biologia", "História", "Geografia", "Filosofia", "Sociologia", "Inglês", "Espanhol", "Artes", "Educação Física", "Lógica de Programação"];
      materias = iniciais.map(nome => ({ nome, anotacoes: [], faltas: 0, notas: [0, 0, 0] }));
      salvarTodosDados();
    }

    function carregarTodosDados() {
      const salvos = localStorage.getItem('mochilaEscolar');
      if (salvos) materias = JSON.parse(salvos);
      else criarMateriasIniciais();
      renderizarListaMaterias();
    }

    function getIconeMateria(nome) {
      const icons = { "Matemática": "fa-calculator", "Física": "fa-atom", /* ... */ "default": "fa-book" };
      return icons[nome] || icons.default;
    }

    // (Mantive todas as funções de matérias e anotações iguais às anteriores - para economizar espaço não repeti todas aqui, mas estão no código completo)

    // ==================== ABA SISTEMAS OPERACIONAIS ====================
    function renderizarSistemasOperacionais() {
      const container = document.getElementById('listaSO');
      container.innerHTML = '';

      sistemasOperacionais.forEach(so => {
        const div = document.createElement('div');
        div.className = `card ${so.cor} bg-zinc-800 border border-zinc-700 rounded-3xl p-6 text-white`;
        div.innerHTML = `
          <div class="flex items-center gap-4 mb-4">
            <i class="${so.icone} text-4xl"></i>
            <div>
              <h3 class="text-2xl font-bold">${so.nome}</h3>
              <p class="text-sm opacity-75">${so.versao}</p>
            </div>
          </div>
          <p class="text-zinc-300 mb-6">${so.descricao}</p>
          <button onclick="marcarComoEstudado(this)" 
                  class="w-full bg-white/10 hover:bg-white/20 py-3 rounded-2xl font-semibold transition-all">
            ✅ Marcar como Estudado
          </button>
        `;
        container.appendChild(div);
      });
    }

    function marcarComoEstudado(btn) {
      btn.textContent = "✅ Estudado!";
      btn.disabled = true;
      btn.classList.add('!bg-emerald-500');
      playActionSound();
      showToast("Sistema marcado como estudado!");
    }

    // ==================== MUDAR ABA ====================
    function mudarAba(n) {
      document.querySelectorAll('[id^="conteudoAba"]').forEach(el => el.classList.add('hidden'));
      document.getElementById(`conteudoAba${n}`).classList.remove('hidden');

      document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active'));
      document.getElementById(`tab${n}`).classList.add('tab-active');

      if (n === 1) renderizarSistemasOperacionais();
    }

    // ==================== OUTRAS FUNÇÕES (adicionarMateria, etc.) ====================
    // ... (as mesmas funções de adicionar, excluir, salvar anotação, etc. que você já tinha)

    function limparTudo() {
      if (confirm("⚠️ Apagar TODA a mochila?")) {
        localStorage.clear();
        materias = [];
        criarMateriasIniciais();
        renderizarListaMaterias();
        showToast("Mochila reiniciada!");
        playActionSound();
      }
    }

    window.onload = () => {
      carregarTodosDados();
      mudarAba(0);

      document.getElementById('buscaMateria').addEventListener('input', e => {
        filtroAtual = e.target.value;
        renderizarListaMaterias();
      });

      document.getElementById('novaMateria').addEventListener('keypress', e => {
        if (e.key === 'Enter') adicionarMateria();
      });

      const textarea = document.getElementById('novaAnotacao');
      textarea.addEventListener('input', () => {
        const count = textarea.value.length;
        document.getElementById('charCount').textContent = `${count} / 2000`;
      });
    };
  </script>
</body>
</html>
